<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .qr { fill: #e5e5e5; stroke: #e5e5e5; }
    .qr-fill { fill: #e5e5e5; }
    @media (prefers-color-scheme: light) {
      .qr { fill: #0a0a0a; stroke: #0a0a0a; }
      .qr-fill { fill: #0a0a0a; }
    }
  </style>
  <!-- Top-left finder pattern -->
  <rect class="qr" x="2" y="2" width="10" height="10" rx="1" fill="none" stroke-width="2"/>
  <rect class="qr-fill" x="5" y="5" width="4" height="4" rx="0.5"/>

  <!-- Top-right finder pattern -->
  <rect class="qr" x="20" y="2" width="10" height="10" rx="1" fill="none" stroke-width="2"/>
  <rect class="qr-fill" x="23" y="5" width="4" height="4" rx="0.5"/>

  <!-- Bottom-left finder pattern -->
  <rect class="qr" x="2" y="20" width="10" height="10" rx="1" fill="none" stroke-width="2"/>
  <rect class="qr-fill" x="5" y="23" width="4" height="4" rx="0.5"/>

  <!-- Data dots -->
  <rect class="qr-fill" x="15" y="15" width="3" height="3" rx="0.5"/>
  <rect class="qr-fill" x="20" y="20" width="3" height="3" rx="0.5"/>
  <rect class="qr-fill" x="26" y="20" width="3" height="3" rx="0.5"/>
  <rect class="qr-fill" x="20" y="26" width="3" height="3" rx="0.5"/>
  <rect class="qr-fill" x="15" y="21" width="3" height="3" rx="0.5"/>
  <rect class="qr-fill" x="21" y="15" width="3" height="3" rx="0.5"/>
  <rect class="qr-fill" x="15" y="2" width="3" height="3" rx="0.5"/>
  <rect class="qr-fill" x="2" y="15" width="3" height="3" rx="0.5"/>
</svg>
